name: Tests
permissions:
  contents: read
on:
  workflow_call:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        rails: ["7.2", "8.0", "8.1"]
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.rails }}.gemfile
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - run: bundle exec rake spec
    - name: Upload test results to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
  exporter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'exporter/go.mod'
        cache-dependency-path: 'exporter/go.sum'
    - name: go test
      working-directory: exporter
      run: go test -v ./...
    - name: go vet
      working-directory: exporter
      run: |
        go vet ./...
    - name: golangci-lint
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
      with:
        working-directory: exporter
    - name: Run govulncheck
      working-directory: exporter
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
  rubocop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
      with:
        ruby-version: 4.0
        bundler-cache: true
    - run: bundle exec rake rubocop
  acceptance:
    runs-on: ubuntu-latest
    needs: [test, exporter, rubocop]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
      with:
        ruby-version: 4.0
        bundler-cache: true
    - run: bundle exec rake acceptance:spec
