name: Release

on:
  push:
    tags:
      - v*

jobs:
  tests:
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yaml
  release-rubygem:
    permissions:
      contents: read
    if: github.repository == 'errm/promenade'
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
      with:
        ruby-version: 4.0
        bundler-cache: true
    - uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
  build-exporter-image-arm64:
    permissions:
      contents: read
      packages: write
    if: github.repository == 'errm/promenade'
    needs: [tests]
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        version: latest
    - name: Login to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}-arm64
        flavor: |
          latest=false
    - name: Build exporter image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
      id: build
      with:
        context: exporter
        platforms: linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        annotations: ${{ steps.meta.outputs.annotations }}
        cache-from: type=gha,scope=linux/arm64
        cache-to: type=gha,scope=linux/arm64,mode=max
        push: true
  build-exporter-image-amd64:
    permissions:
      contents: read
      packages: write
    if: github.repository == 'errm/promenade'
    needs: [tests]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        version: latest
    - name: Login to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}-amd64
        flavor: |
          latest=false
    - name: Build exporter image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
      id: build
      with:
        context: exporter
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        annotations: ${{ steps.meta.outputs.annotations }}
        cache-from: type=gha,scope=linux/amd64
        cache-to: type=gha,scope=linux/amd64,mode=max
        push: true
  push-manifest:
    permissions:
      contents: read
      packages: write
    if: github.repository == 'errm/promenade'
    needs: [build-exporter-image-arm64, build-exporter-image-amd64]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        version: latest
    - name: Login to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
    - name: Get execution timestamp with RFC3339 format
      id: timestamp
      run: |
        echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
    - name: Build exporter manifest
      run: |
        docker buildx imagetools create \
          $(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          --annotation='index:org.opencontainers.image.description=${{ github.event.repository.description }}' \
          --annotation='index:org.opencontainers.image.created=${{ steps.timestamp.outputs.timestamp }}' \
          --annotation='index:org.opencontainers.image.url=${{ github.event.repository.url }}' \
          --annotation='index:org.opencontainers.image.source=${{ github.event.repository.url }}' \
          ghcr.io/${{ github.repository }}@${{ needs.build-exporter-image-arm64.outputs.digest }} \
          ghcr.io/${{ github.repository }}@${{ needs.build-exporter-image-amd64.outputs.digest }}
